<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Akansha ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      overflow: hidden;
    }
    h1 {
      margin-top: 100px;
      font-size: 2.5rem;
      color: #fff;
    }
    .btn {
      padding: 15px 25px;
      font-size: 18px;
      margin: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: absolute;
      transition: 0.2s;
    }
    #yes {
      background: #ff4d6d;
      color: white;
      left: 45%;
      top: 60%;
    }
    #no {
      background: #444;
      color: white;
      left: 55%;
      top: 60%;
    }
  </style>
</head>
<body>

<h1>Akansha, will you be my Valentine? ❤️</h1>

<button id="yes" class="btn" onclick="sayYes()">Yes 💖</button>
<button id="no" class="btn">No 😢</button>

<script>
  const noBtn = document.getElementById("no");

  noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  function sayYes() {
    document.body.innerHTML = "<h1>Yayyy Akansha ❤️ I knew it 😍</h1>";
  }
</script>

</body>
</html>
